<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – Faculty Timetable System</title>
  <meta name="description" content="Secure login portal for the Faculty Subject Allocation & Timetable Management System."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-page">

  <!-- Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
      <h1>Faculty<span> Timetable</span></h1>
      <p class="login-subtitle">Subject Allocation & Timetable Management System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Tab switcher -->
    <div class="tab-group" id="tabGroup">
      <button class="tab-btn active" data-tab="admin" onclick="switchTab('admin')">
        🔑 Admin Login
      </button>
      <button class="tab-btn" data-tab="faculty" onclick="switchTab('faculty')">
        👤 Faculty Login
      </button>
    </div>

    <!-- Admin Form -->
    <form method="POST" id="adminForm" class="login-form active-form">
      <input type="hidden" name="login_type" value="admin"/>
      <div class="form-group">
        <label for="adminUser">Username</label>
        <input type="text" id="adminUser" name="username" placeholder="Enter admin username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="adminPass">Password</label>
        <input type="password" id="adminPass" name="password" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full">
        Login as Admin <span class="btn-arrow">→</span>
      </button>
      <p class="hint-text">Default: admin / admin123</p>
    </form>

    <!-- Faculty Form -->
    <form method="POST" id="facultyForm" class="login-form" style="display:none">
      <input type="hidden" name="login_type" value="faculty"/>
      <div class="form-group">
        <label for="facEmail">Email Address</label>
        <input type="email" id="facEmail" name="username" placeholder="Enter your college email" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="facPass">Password</label>
        <input type="password" id="facPass" name="password" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full btn-faculty">
        Login as Faculty <span class="btn-arrow">→</span>
      </button>
      <p class="hint-text">Sample: ananya@college.edu / pass123</p>
    </form>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('adminForm').style.display   = tab === 'admin'   ? 'flex' : 'none';
      document.getElementById('facultyForm').style.display = tab === 'faculty' ? 'flex' : 'none';
    }
  </script>
</body>
</html>
